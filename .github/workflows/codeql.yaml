name: CodeQL

# Auto-triggers are disabled while the repo is private without GitHub
# Advanced Security — Code Scanning is unavailable, so SARIF upload fails
# at the end of every run. Re-enable by restoring the original trigger
# block once the repo goes public or GHAS is provisioned:
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#       branches: [main]
#     schedule:
#       - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC
on:
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
